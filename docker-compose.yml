services:
  bot:
    build: .
    restart: unless-stopped

    environment:
      # Coolify detects variables when they use ${VAR} syntax.
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      POLL_INTERVAL: ${POLL_INTERVAL:-3600}
      TEST_WORKERS: ${TEST_WORKERS:-50}
      TEST_TIMEOUT: ${TEST_TIMEOUT:-5.0}
      TOP_N: ${TOP_N:-10}
      STATE_FILE: ${STATE_FILE:-data/state.json}
      XRAY_BIN: ${XRAY_BIN:-/usr/local/bin/xray}

    volumes:
      - ./data:/app/data

    ulimits:
      nofile:
        soft: 65536
        hard: 65536

    cap_add:
      - NET_ADMIN
